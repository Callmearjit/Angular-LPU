<h2>Customer List</h2>

<input type="text" [(ngModel)]="searchText" placeholder="Search by name">
<button (click)="search()">Search</button>

<div *ngFor="let customer of pagedCustomers">
  <app-customer-details [customer]="customer"></app-customer-details>
</div>

<br>

<button (click)="prevPage()" [disabled]="currentPage === 1">
  Previous
</button>

<button (click)="nextPage()" 
  [disabled]="currentPage * pageSize >= filteredCustomers.length">
  Next
</button>
